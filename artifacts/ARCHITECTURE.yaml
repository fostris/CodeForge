project: ai-pipeline
version: "1.0"
description: "Hybrid local/cloud AI-driven feature development pipeline"

modules:
  - name: models
    type: service
    description: "LLM client abstraction layer"
    files:
      - src/models/__init__.py
      - src/models/base.py
      - src/models/ollama_client.py
      - src/models/openrouter_client.py
    interfaces:
      - "ModelClient.generate(prompt: str, model: str, temperature: float) -> str"
      - "ModelClient.generate_async(prompt, model, temperature) -> Coroutine[str]"
    dependencies: []
    risk_level: low
    owner: system

  - name: artifacts
    type: service
    description: "Artifact loading and validation (YAML, JSON, Markdown)"
    files:
      - src/artifacts/__init__.py
      - src/artifacts/loader.py
      - src/artifacts/validator.py
    interfaces:
      - "load_architecture(path: str) -> dict"
      - "load_task_graph(path: str) -> list[Task]"
      - "load_spec(path: str) -> dict"
      - "validate_task(task: dict) -> bool"
    dependencies: []
    risk_level: low
    owner: system

  - name: context_builder
    type: service
    description: "Minimal context assembly for LLM calls"
    files:
      - src/pipeline/context_builder.py
    interfaces:
      - "ContextBuilder.for_spec_review(spec: dict) -> dict"
      - "ContextBuilder.for_architecture(spec: dict, rules: str) -> dict"
      - "ContextBuilder.for_decomposition(architecture: dict) -> dict"
      - "ContextBuilder.for_test_generation(task: dict, interfaces: dict) -> dict"
      - "ContextBuilder.for_implementation(task: dict, test_code: str, iteration: int) -> dict"
    dependencies: [artifacts]
    risk_level: low
    owner: orchestration

  - name: router
    type: service
    description: "Route tasks to appropriate model tier based on rules"
    files:
      - src/pipeline/router.py
    interfaces:
      - "route_task(task: dict) -> Literal['local_cheap', 'local_strong', 'cloud']"
      - "route_stage(stage: str, input_metadata: dict) -> str"
      - "should_escalate(iteration: int, error_count: int, diff_lines: int) -> bool"
    dependencies: []
    risk_level: medium
    owner: orchestration

  - name: docker_runner
    type: service
    description: "Execute code in isolated Docker sandbox"
    files:
      - src/docker/__init__.py
      - src/docker/runner.py
      - src/docker/builder.py
    interfaces:
      - "DockerRunner.run_tests(test_file: str, project_path: str) -> TestResult"
      - "DockerRunner.run_code(code: str, env_vars: dict) -> ExecutionResult"
      - "ensure_image_built(dockerfile_path: str) -> bool"
    dependencies: []
    risk_level: medium
    owner: execution

  - name: pipeline_core
    type: controller
    description: "LangGraph state machine and orchestration"
    files:
      - src/pipeline/__init__.py
      - src/pipeline/state.py
      - src/pipeline/graph.py
      - src/pipeline/escalator.py
    interfaces:
      - "PipelineState (TypedDict with task lifecycle)"
      - "build_pipeline() -> StateGraph"
      - "execute_pipeline(initial_state: dict) -> dict"
      - "escalate_task(task: dict, reason: str) -> dict"
    dependencies: [models, router, context_builder, docker_runner, artifacts]
    risk_level: high
    owner: orchestration

  - name: config
    type: library
    description: "Configuration, logging, constants"
    files:
      - src/config.py
    interfaces:
      - "get_logger(name: str) -> Logger"
      - "Config (Pydantic model with all settings)"
      - "MODEL_TIERS: Dict[str, ModelTierConfig]"
    dependencies: []
    risk_level: low
    owner: system

data_flow: |
  User Input (Spec, Requirements)
    ↓
  Intake → (validate inputs, normalize spec)
    ↓
  Architecture → (design modules, interfaces, dependencies)
    ↓
  Decomposition → (break into tasks with size limits)
    ↓
  TDD Loop ┌→ (write tests per task spec)
    ↓      │
  Impl Loop→ Router → [local_cheap | local_strong | cloud]
         │          ↓
         └← Escalate (if 3 iterations OR error)
    ↓
  Final Review → (verify architecture integrity, coverage)
    ↓
  Output (Code, Reports, Diffs)

constraints:
  - models field of tasks: ≤3 files per task
  - iterations: ≤3 per task before escalation
  - diff: ≤200 LOC per task
  - public_interfaces: ≤1 change per task
  - async_everywhere: All I/O must be async
  - no_lazy_loading: Explicit eager load patterns
  - context_minimization: Only needed context to models

libraries:
  langgraph: ">=0.0.6"
  pydantic: ">=2.0"
  httpx: ">=0.24"
  pyyaml: ">=6.0"
  docker: ">=6.0"
  pytest: ">=7.4"

decision_log:
  - "2026-03-25: Chose LangGraph for orchestration (explicit state, visualizable)"
  - "2026-03-25: Model tiers: cheap (7B), strong (32B), cloud (Claude via OpenRouter)"
  - "2026-03-25: Docker sandbox for test isolation, no network access"
  - "2026-03-25: YAML artifacts for human readability + machine parsing"
